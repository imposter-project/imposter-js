name: CI
on:
  - push
  - pull_request
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: docker
            version: '4.9.1'
          - engine: golang
            version: '5.14.5'
    name: build (${{ matrix.engine }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install Imposter
        uses: imposter-project/imposter-github-action/setup@v0.6.1
      - name: Pull engine
        run: imposter engine pull --engine-type ${{ matrix.engine }} --version ${{ matrix.version }}

      - name: Configure engine
        run: |
          echo '{"engine":"${{ matrix.engine }}","version":"${{ matrix.version }}"}' > imposter.config.json
          cat imposter.config.json

      - name: Install core module dependencies
        run: npm install
      - name: Test core module
        run: |
          export IMPOSTER_DOCKER_CONTAINERUSER="$(id -u)"
          npm test
      - name: Build core module
        run: npm run build

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/') && matrix.engine == 'docker'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  test-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - engine: docker
            version: '4.9.1'
          - engine: golang
            version: '5.14.5'
    name: test-examples (${{ matrix.engine }})
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Install Imposter
        uses: imposter-project/imposter-github-action/setup@v0.6.1
      - name: Pull engine
        run: imposter engine pull --engine-type ${{ matrix.engine }} --version ${{ matrix.version }}

      - name: Configure engine
        run: |
          for config in imposter.config.json examples/*/imposter.config.json; do
            echo '{"engine":"${{ matrix.engine }}","version":"${{ matrix.version }}"}' > "$config"
          done

      - name: Install core module dependencies
        run: npm install

      - name: Install example-javascript project dependencies
        working-directory: examples/example-javascript
        run: |
          npm run prep-example
          npm install
      - name: Test example-javascript project
        working-directory: examples/example-javascript
        run: |
          export IMPOSTER_DOCKER_CONTAINERUSER="$(id -u)"
          npm test

      - name: Install example-typescript-esm project dependencies
        working-directory: examples/example-typescript-esm
        run: |
          npm run prep-example
          npm install
      - name: Test example-typescript-esm project
        working-directory: examples/example-typescript-esm
        run: |
          export IMPOSTER_DOCKER_CONTAINERUSER="$(id -u)"
          npm test

      - name: Install example-vitest project dependencies
        working-directory: examples/example-vitest
        run: |
          npm run prep-example
          npm install
      - name: Test example-vitest project
        working-directory: examples/example-vitest
        run: |
          export IMPOSTER_DOCKER_CONTAINERUSER="$(id -u)"
          npm test

  release:
    needs: [build, test-examples]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # This is required for the `npm publish` command to generate provenance
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Get Changelog Entries
        uses: release-tools/since@65003e0e83e110417af23d8a34873c48cc8981ef
        with:
          output-file: version_changelog.txt

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to NPM
        working-directory: dist
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: version_changelog.txt
          draft: false
          prerelease: false
